# Releases are automated: merging a PR whose last commit bumps the workspace version IS
# the release. On every push to main this workflow reads the version, publishes whichever
# crates crates.io does not serve at it yet — in dependency order — and then tags the
# commit and creates the GitHub release. A merge without a version bump publishes nothing
# and changes nothing; a run that failed halfway is safe to re-run, it just finishes.
#
# Authentication is crates.io Trusted Publishing (OIDC): no long-lived token is stored
# anywhere. Each crate carries a Trusted Publishing entry on crates.io naming this repo
# and this workflow file; the auth action exchanges the runner's identity for a
# short-lived, crate-scoped token at publish time.
#
# The gate is not re-run here: every PR into main already passed `ci` and the version
# gate, and `cargo publish` verify-builds every tarball against the registry anyway.
# The manual fallback sequence lives in PUBLISHING.md.
name: publish
on:
  push:
    branches: [main]

permissions:
  contents: write # create the release tag
  id-token: write # crates.io Trusted Publishing (OIDC)

# Never two releases at once; a second merge waits for the first to finish.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read the workspace version (and check the two literals agree)
        id: version
        run: |
          version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -1)"
          [ -n "$version" ] || { echo "no workspace version found"; exit 1; }
          pin="$(sed -n 's/.*{ path = "dto", version = "\([^"]*\)" }.*/\1/p' Cargo.toml)"
          if [ "$pin" != "$version" ]; then
            echo "the version literals disagree: [workspace.package] says $version, the packdiff-dto pin says $pin"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Ask the index which crates still need this version
        id: todo
        run: |
          missing=""
          for crate in packdiff-dto packdiff-wasm packdiff; do
            # The sparse-index path for names of 4+ characters: first two / next two / name.
            path="$(printf '%s' "$crate" | cut -c1-2)/$(printf '%s' "$crate" | cut -c3-4)/$crate"
            if curl -fsSL "https://index.crates.io/$path" | grep -q "\"vers\":\"${{ steps.version.outputs.version }}\""; then
              echo "$crate ${{ steps.version.outputs.version }} is already on crates.io"
            else
              echo "$crate ${{ steps.version.outputs.version }} needs publishing"
              missing="$missing $crate"
            fi
          done
          echo "missing=$missing" >> "$GITHUB_OUTPUT"

      # Publishing `packdiff` (the cli crate) verify-builds it, and its build script
      # compiles the inlined comment engine for wasm32-unknown-unknown.
      - name: Install the wasm target
        if: steps.todo.outputs.missing != ''
        run: rustup target add wasm32-unknown-unknown

      - name: Mint a short-lived crates.io token (Trusted Publishing)
        if: steps.todo.outputs.missing != ''
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish the missing crates, in dependency order
        if: steps.todo.outputs.missing != ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          for crate in ${{ steps.todo.outputs.missing }}; do
            cargo publish -p "$crate"
          done

      - name: Tag the release on GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $tag already exists"
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$tag" --generate-notes
          fi
